server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: rotas do react-router caem no index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # cache de assets versionados (hash no nome)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
